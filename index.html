<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест НВТП РК</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #000000;
            --panel: #111111;
            --text: #ffffff;
            --muted: #888888;
            --line: #222222;
            --accent: #ffffff;
            --danger: #ff8181;
            --danger-soft: rgba(255, 129, 129, 0.12);
            --success: #7df2b2;
            --success-soft: rgba(125, 242, 178, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html {
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .page {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .shell {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hero {
            text-align: left;
            margin-bottom: 10px;
        }

        .hero h1 {
            margin: 8px 0 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .eyebrow {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .content {
            display: contents;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 20px;
        }

        .hidden { display: none !important; }

        .start-grid,
        .quiz-layout {
            display: grid;
            gap: 14px;
        }

        .card h2 {
            margin: 0 0 16px;
            font-size: 20px;
            font-weight: 700;
        }

        .field {
            margin-top: 16px;
        }

        .input-grid {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        label {
            display: inline-block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--muted);
        }

        input,
        select,
        button {
            width: 100%;
            border-radius: 12px;
            font: inherit;
            transition: all 0.2s ease;
        }

        input,
        select {
            padding: 14px;
            border: 1px solid var(--line);
            background: #000;
            color: var(--text);
            outline: none;
        }

        input::placeholder { color: #444; }

        input:focus,
        select:focus {
            border-color: #555;
            background: #050505;
        }

        button {
            padding: 16px;
            cursor: pointer;
            border: none;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:active { transform: scale(0.98); }

        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-primary {
            background: #fff;
            color: #000;
            font-weight: 700;
        }

        .btn-secondary {
            background: #1a1a1a;
            color: var(--text);
            font-weight: 700;
        }

        .btn-next {
            background: #333;
            color: var(--text);
            font-weight: 700;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .pill {
            padding: 6px 12px;
            border-radius: 8px;
            background: #111;
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .navigator {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-top: 12px;
        }

        .nav-btn {
            padding: 10px 0;
            border-radius: 8px;
            background: #111;
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 12px;
        }

        .nav-btn.current {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .nav-btn.done { border-color: #444; color: #fff; }

        .progress-wrap {
            margin-bottom: 20px;
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .progress-bar {
            height: 4px;
            border-radius: 999px;
            background: #111;
            overflow: hidden;
        }

        .progress-value {
            height: 100%;
            width: 0;
            background: #fff;
            transition: width 0.2s ease;
        }

        .question-number {
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .question-text {
            margin: 0;
            font-size: 20px;
            line-height: 1.3;
            font-weight: 600;
        }

        .answers {
            display: grid;
            gap: 10px;
            margin-top: 24px;
        }

        .answer-btn {
            padding: 14px 16px;
            text-align: left;
            background: #111;
            border: 1px solid var(--line);
            color: var(--text);
            font-weight: 500;
            font-size: 15px;
        }

        .answer-btn.selected { border-color: #fff; background: #222; }

        .feedback {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.5;
        }

        .feedback.wrong { background: var(--danger-soft); color: var(--danger); }

        .quiz-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .quiz-actions button { flex: 1; }

        .result-box {
            text-align: center;
            padding: 40px 20px;
        }

        .score-ring {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            border-radius: 50%;
            display: grid;
            place-items: center;
            border: 2px solid var(--line);
        }

        .score-ring span { font-size: 28px; font-weight: 800; }

        .result-title {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .result-note {
            color: var(--muted);
            font-size: 14px;
        }

        .result-actions {
            display: grid;
            gap: 10px;
            margin-top: 30px;
        }

        .footnote { margin-top: 12px; font-size: 11px; color: var(--muted); }

        @media (min-width: 500px) {
            .page { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="shell">
            <div class="hero">
                <div class="eyebrow">НВТП РК</div>
                <h1>Тестирование по разным темам.</h1>
            </div>

            <div class="content">
                <section id="screen-start">
                    <div class="start-grid">
                        <div class="card">
                            <h2>Выбор темы</h2>

                            <div class="input-grid">
                                <div class="field">
                                    <label for="student-name">Имя</label>
                                    <input id="student-name" type="text" placeholder="Введите имя">
                                </div>
                                <div class="field">
                                    <label for="student-surname">Фамилия</label>
                                    <input id="student-surname" type="text" placeholder="Введите фамилию">
                                </div>
                            </div>

                            <div class="field">
                                <label for="theme-select">Тема</label>
                                <select id="theme-select">
                                    <option value="">Выберите одну из 32 тем</option>
                                </select>
                            </div>

                            <div class="field">
                                <button id="start-btn" class="btn-primary">Начать тест</button>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="screen-quiz" class="hidden">
                    <div class="meta-row">
                        <div class="pill" id="quiz-theme-pill">Тема</div>
                        <div class="pill" id="quiz-count-pill">30 вопросов</div>
                    </div>

                    <div class="quiz-layout">
                        <aside>
                            <h3>Навигация</h3>
                            <div class="navigator" id="navigator"></div>
                        </aside>

                        <div>
                            <div class="progress-wrap">
                                <div class="progress-top">
                                    <span id="progress-label">Вопрос 1 из 30</span>
                                    <span id="progress-extra">Отвечено: 0/30</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-value" id="progress-value"></div>
                                </div>
                            </div>

                            <div class="card">
                                <div class="question-number" id="question-number">Вопрос 1</div>
                                <p class="question-text" id="question-text"></p>
                                <div class="answers" id="answers"></div>
                                <div id="feedback" class="feedback hidden"></div>
                                <div class="quiz-actions">
                                    <button id="prev-btn" class="btn-secondary">Назад</button>
                                    <button id="next-btn" class="btn-next">Дальше</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="screen-result" class="hidden">
                    <div class="card result-box">
                        <div class="eyebrow">Результат</div>
                        <div class="score-ring" id="score-ring">
                            <span id="score-value">0%</span>
                        </div>
                        <h2 class="result-title" id="result-title">Тест завершен</h2>
                        <p class="result-note" id="result-note"></p>
                        <p class="footnote" id="submission-status"></p>
                        <div class="result-actions">
                            <button id="retry-btn" class="btn-primary">Пройти тему заново</button>
                            <button id="back-btn" class="btn-secondary">К выбору темы</button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
       window.NVTP_THEMES = [
  { id: 2, title: "Конституционные основы обороны государства." },
  { id: 3, title: "Воинские символы Вооруженных Сил Республики Казахстан." },

 </script>
    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymr6sUloeLe6qkSbhScw61OYM3FomVU1cgU43NNWIGV2DA9ZwoxPMeXQUDPjauyeT1/exec";

        const THEMES = window.NVTP_THEMES || [];
        const state = {
            selectedTheme: null,
            questions: [],
            currentIndex: 0,
            answers: [],
            studentName: "",
            studentSurname: "",
            startedAt: null
        };

        const studentNameInput = document.getElementById("student-name");
        const studentSurnameInput = document.getElementById("student-surname");
        const themeSelect = document.getElementById("theme-select");
        const themePreview = document.getElementById("theme-preview");
        const startBtn = document.getElementById("start-btn");
        const screenStart = document.getElementById("screen-start");
        const screenQuiz = document.getElementById("screen-quiz");
        const screenResult = document.getElementById("screen-result");
        const quizThemePill = document.getElementById("quiz-theme-pill");
        const navigatorBox = document.getElementById("navigator");
        const questionNumber = document.getElementById("question-number");
        const questionText = document.getElementById("question-text");
        const answersBox = document.getElementById("answers");
        const feedback = document.getElementById("feedback");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const progressLabel = document.getElementById("progress-label");
        const progressExtra = document.getElementById("progress-extra");
        const progressValue = document.getElementById("progress-value");
        const scoreValue = document.getElementById("score-value");
        const scoreRing = document.getElementById("score-ring");
        const resultTitle = document.getElementById("result-title");
        const resultNote = document.getElementById("result-note");
        const submissionStatus = document.getElementById("submission-status");
        const retryBtn = document.getElementById("retry-btn");
        const backBtn = document.getElementById("back-btn");

        function shuffleItems(items) {
            const shuffled = items.slice();
            for (let index = shuffled.length - 1; index > 0; index -= 1) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
            }
            return shuffled;
        }

        function buildQuestions(themeItem) {
            return shuffleItems((themeItem.questions || []).map((q, index) => {
                const correctAnswer = q.options[q.answer];
                const shuffledOptions = shuffleItems(q.options);
                return {
                    id: q.id || `${themeItem.id}-${index + 1}`,
                    text: q.question,
                    options: shuffledOptions,
                    correctIndex: shuffledOptions.indexOf(correctAnswer)
                };
            }));
        }

        function setActiveScreen(screen) {
            screenStart.classList.add("hidden");
            screenQuiz.classList.add("hidden");
            screenResult.classList.add("hidden");
            screen.classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function fillThemeOptions() {
            THEMES.forEach((item) => {
                const option = document.createElement("option");
                option.value = String(item.id);
                option.textContent = `Тема ${item.id}. ${item.title}`;
                themeSelect.appendChild(option);
            });
        }

        function answeredCount() {
            return state.answers.filter((item) => item !== null).length;
        }

        function correctCount() {
            return state.answers.reduce((total, answer, index) => {
                if (answer === null) {
                    return total;
                }
                return total + (answer === state.questions[index].correctIndex ? 1 : 0);
            }, 0);
        }

        function renderNavigator() {
            navigatorBox.innerHTML = "";
            state.questions.forEach((_, index) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "nav-btn";
                if (index === state.currentIndex) {
                    button.classList.add("current");
                } else if (state.answers[index] !== null) {
                    button.classList.add("done");
                }
                button.textContent = index + 1;
                button.addEventListener("click", () => {
                    state.currentIndex = index;
                    renderQuestion();
                });
                navigatorBox.appendChild(button);
            });
        }

        function renderProgress() {
            const current = state.currentIndex + 1;
            const total = state.questions.length;
            const done = answeredCount();
            progressLabel.textContent = `Вопрос ${current} из ${total}`;
            progressExtra.textContent = `Отвечено: ${done}/${total}`;
            progressValue.style.width = `${(done / total) * 100}%`;
        }

        function renderQuestion() {
            const item = state.questions[state.currentIndex];
            const selectedAnswer = state.answers[state.currentIndex];

            questionNumber.textContent = `Вопрос ${state.currentIndex + 1}`;
            questionText.textContent = item.text;
            answersBox.innerHTML = "";

            item.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "answer-btn";
                button.textContent = option;

                if (selectedAnswer === index) {
                    button.classList.add("selected");
                }

                button.addEventListener("click", () => {
                    chooseAnswer(index);
                });
                answersBox.appendChild(button);
            });

            feedback.className = "feedback hidden";
            feedback.textContent = "";

            prevBtn.disabled = state.currentIndex === 0;
            nextBtn.textContent = state.currentIndex === state.questions.length - 1 ? "Завершить тест" : "Дальше";

            renderNavigator();
            renderProgress();
        }

        function chooseAnswer(answerIndex) {
            state.answers[state.currentIndex] = answerIndex;
            feedback.className = "feedback hidden";
            feedback.textContent = "";
            renderQuestion();
        }

        function formatAnswersForSubmit() {
            return state.answers.map((answer, index) => {
                const question = state.questions[index];
                return `${index + 1}:${question.id}:${answer === null ? "-" : answer + 1}`;
            }).join("|");
        }

        function formatQuestionOrderForSubmit() {
            return state.questions.map((question, index) => `${index + 1}:${question.id}`).join("|");
        }

        function submitResult(correct, total, percent) {
            const params = new URLSearchParams({
                name: state.studentName,
                surname: state.studentSurname,
                theme_id: String(state.selectedTheme.id),
                theme_title: state.selectedTheme.title,
                score_percent: String(percent),
                correct_count: String(correct),
                total_questions: String(total),
                answers_map: formatAnswersForSubmit(),
                question_order: formatQuestionOrderForSubmit(),
                submitted_at: new Date().toISOString(),
                duration_ms: String(state.startedAt ? Date.now() - state.startedAt : 0)
            });

            try {
                new Image().src = `${GOOGLE_SCRIPT_URL}?${params.toString()}`;
                submissionStatus.textContent = "Результат успешно сохранен.";
            } catch (error) {
                submissionStatus.textContent = "Результат показан на экране, но отправку в Google Apps Script не удалось запустить.";
            }
        }

        async function startQuiz() {
            const selected = THEMES.find((item) => String(item.id) === themeSelect.value);
            if (!selected) {
                themePreview.textContent = "Сначала выберите тему из списка.";
                return;
            }

            const studentName = studentNameInput.value.trim();
            const studentSurname = studentSurnameInput.value.trim();
            if (!studentName || !studentSurname) {
                themePreview.textContent = "Сначала заполните имя и фамилию, затем выберите тему и начните тест.";
                return;
            }

            startBtn.disabled = true;
            startBtn.textContent = "Загрузка вопросов...";

            try {
                // Загружаем вопросы из внешнего JSON файла
                const response = await fetch(`nvpt_rk_questions/topic_${selected.id}.json`);
                if (!response.ok) throw new Error("Не удалось загрузить вопросы для этой темы");
                
                const data = await response.json();
                state.selectedTheme = selected;
                state.selectedTheme.questions = data.questions;
                state.questions = buildQuestions(state.selectedTheme);
                
                if (state.questions.length === 0) throw new Error("В выбранной теме нет вопросов");

                state.currentIndex = 0;
                state.answers = new Array(state.questions.length).fill(null);
                state.studentName = studentName;
                state.studentSurname = studentSurname;
                state.startedAt = Date.now();
                submissionStatus.textContent = "";
            } catch (error) {
                themePreview.textContent = `Ошибка: ${error.message}`;
                startBtn.disabled = false;
                startBtn.textContent = "Начать тест";
                return;
            } finally {
                startBtn.disabled = false;
                startBtn.textContent = "Начать тест";
            }

            quizThemePill.textContent = `Тема ${selected.id}. ${selected.title}`;
            document.title = `НВТП РК • Тема ${selected.id}`;
            setActiveScreen(screenQuiz);
            renderQuestion();
        }

        function finishQuiz() {
            const total = state.questions.length;
            const correct = correctCount();
            const percent = Math.round((correct / total) * 100);
            const degrees = Math.max(0, Math.min(360, (percent / 100) * 360));

            scoreValue.textContent = `${percent}%`;
            scoreRing.style.background =
                `radial-gradient(circle at center, var(--panel) 0 58%, transparent 59%), ` +
                `conic-gradient(var(--accent) 0deg, var(--accent-2) ${degrees}deg, var(--panel-3) ${degrees}deg 360deg)`;

            resultTitle.textContent = `Тема ${state.selectedTheme.id} завершена`;
            resultNote.textContent = `${state.studentSurname} ${state.studentName}: ${correct} из ${total} правильных ответов.`;
            submissionStatus.textContent = "Сохранение...";

            setActiveScreen(screenResult);
            submitResult(correct, total, percent);
        }

        function goNext() {
            if (state.answers[state.currentIndex] === null) {
                feedback.className = "feedback wrong";
                feedback.textContent = "Сначала выберите ответ, затем переходите дальше.";
                return;
            }

            if (state.currentIndex === state.questions.length - 1) {
                finishQuiz();
                return;
            }

            state.currentIndex += 1;
            renderQuestion();
        }

        function goPrev() {
            if (state.currentIndex === 0) {
                return;
            }
            state.currentIndex -= 1;
            renderQuestion();
        }

        function restartCurrentTheme() {
            if (!state.selectedTheme) {
                setActiveScreen(screenStart);
                return;
            }
            state.questions = buildQuestions(state.selectedTheme);
            state.currentIndex = 0;
            state.answers = new Array(state.questions.length).fill(null);
            state.startedAt = Date.now();
            submissionStatus.textContent = "";
            setActiveScreen(screenQuiz);
            renderQuestion();
        }

        function backToThemes() {
            document.title = "Тест НВТП РК";
            submissionStatus.textContent = "";
            setActiveScreen(screenStart);
        }

        fillThemeOptions();

        startBtn.addEventListener("click", startQuiz);
        prevBtn.addEventListener("click", goPrev);
        nextBtn.addEventListener("click", goNext);
        retryBtn.addEventListener("click", restartCurrentTheme);
        backBtn.addEventListener("click", backToThemes);
    </script>
</body>
</html>
